workflows:
  android-release:
    name: Android Release Pipeline
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: |
          flutter packages pub get
      - name: Build Android App (APK & AAB)
        script: |
          flutter build apk --release
          flutter build appbundle --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/app/outputs/bundle/release/app-release.aab

  ios-release:
    name: iOS Release Pipeline
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: |
          flutter packages pub get
      - name: Build iOS App and Create IPA
        script: |
          set -e # Stop on error
          flutter build ios --release --no-codesign
          
          mkdir -p build/ios/ipa/Payload
          
          # Flutter puts the output in Release-iphoneos, and optionally a symlink in iphoneos.
          # We use cp -RL to ensure we copy the actual directory, not just a symlink.
          if [ -d "build/ios/Release-iphoneos/Runner.app" ]; then
            cp -RL build/ios/Release-iphoneos/Runner.app build/ios/ipa/Payload/
          elif [ -d "build/ios/iphoneos/Runner.app" ]; then
            cp -RL build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          else
            echo "Error: Could not find Runner.app"
            exit 1
          fi
          
          cd build/ios/ipa
          zip -qr app.ipa Payload
    artifacts:
      - build/ios/ipa/app.ipa
